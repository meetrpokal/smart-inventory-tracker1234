<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Inventory Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --secondary: #10B981;
            --background: #0f172a;
            --surface: rgba(30, 41, 59, 0.6);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--background);
            background-image: radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        h2 {
            font-weight: 700;
            background: linear-gradient(135deg, #a5b4fc, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-control {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--surface-border);
            color: var(--text-main);
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 20px;
        }

        .form-control:focus {
            background-color: rgba(15, 23, 42, 0.8);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(79, 70, 229, 0.25);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            border: none;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            width: 100%;
            padding: 12px;
            font-weight: 500;
            border-radius: 8px;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        }

        .toggle-link {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .toggle-link:hover {
            color: #818cf8;
            text-decoration: underline;
        }

        .alert {
            display: none;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .alert-danger {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <h2 id="authTitle">Login</h2>
        <div id="alertBox" class="alert alert-danger"></div>
        
        <form id="authForm">
            <input type="text" class="form-control" id="username" placeholder="Organization ID" required>
            <input type="password" class="form-control" id="password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary" id="submitBtn">Login</button>
        </form>
        
        <a class="toggle-link" id="toggleAuth">Don't have an account? Sign up</a>
    </div>

    <script>
        let isLogin = true;

        document.getElementById('toggleAuth').addEventListener('click', () => {
            isLogin = !isLogin;
            document.getElementById('authTitle').innerText = isLogin ? 'Login' : 'Sign Up';
            document.getElementById('submitBtn').innerText = isLogin ? 'Login' : 'Create Account';
            document.getElementById('toggleAuth').innerText = isLogin ? "Don't have an account? Sign up" : 'Already have an account? Login';
            document.getElementById('alertBox').style.display = 'none';
        });

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alertBox');

            const endpoint = isLogin ? '/login' : '/register';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    window.location.href = '/';
                } else {
                    alertBox.innerText = data.message || 'An error occurred';
                    alertBox.style.display = 'block';
                }
            } catch (error) {
                alertBox.innerText = 'Network error. Please try again.';
                alertBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
